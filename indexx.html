<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory Reservation System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Inventory Reservation System</h1>

    <div id="product-list" class="products"></div>

    <div id="reservation-box" class="reservation hidden">
      <h2>Reservation Details</h2>

      <p><strong>Product:</strong> <span id="res-product"></span></p>
      <p><strong>Warehouse:</strong> <span id="res-warehouse"></span></p>
      <p><strong>Status:</strong> <span id="res-status">Pending</span></p>

      <div class="timer">
        Time Left: <span id="countdown">10:00</span>
      </div>

      <div class="buttons">
        <button id="confirm-btn">Confirm Purchase</button>
        <button id="cancel-btn">Cancel</button>
      </div>
    </div>

    <div id="message"></div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
